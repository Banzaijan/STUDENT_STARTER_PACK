name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config libffi-dev libssl-dev libltdl-dev
          pip install buildozer cython

      - name: Create init files
        run: touch screens/__init__.py widgets/__init__.py utils/__init__.py

      - name: Create buildozer.spec
        run: |
          buildozer init
          sed -i 's/^title.*/title = Student Starter Pack/' buildozer.spec
          sed -i 's/^package.name.*/package.name = studentstarterpack/' buildozer.spec
          sed -i 's/^package.domain.*/package.domain = com.asiatech.student/' buildozer.spec
          sed -i 's/^source.include_exts.*/source.include_exts = py,png,jpg,kv,json/' buildozer.spec
          sed -i 's/^requirements.*/requirements = python3,kivy==2.3.0/' buildozer.spec
          sed -i 's/^#android.api.*/android.api = 33/' buil
