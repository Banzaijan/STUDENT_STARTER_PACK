name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config libffi-dev libssl-dev \
            libltdl-dev zlib1g-dev
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Create init files
        run: |
          touch screens/__init__.py widgets/__init__.py utils/__init__.py

      - name: Create buildozer.spec
        run: |
          buildozer init
          sed -i 's/^title.*/title = Student Starter Pack/' buildozer.spec
          sed -i 's/^package.name.*/package.name = studentstarterpack/' buildozer.spec
          sed -i 's/^package.domain.*/package.domain = com.asiatech.student/' buildozer.spec
          sed -i 's/^source.include_exts.*/source.include_exts = py,png,jpg,kv,json/' buildozer.spec
          sed -i 's/^requirements.*/requirements = python3,kivy==2.3.0/' buildozer.spec
          sed -i 's/^#android.api.*/android.api = 33/' buildozer.spec
          sed -i 's/^#android.minapi.*/android.minapi = 21/' buildozer.spec
          sed -i 's/^#android.ndk .*/android.ndk = 25b/' buildozer.spec
          sed -i 's/^#android.archs.*/android.archs = arm64-v8a/' buildozer.spec
          cat buildozer.spec

      - name: Build APK
        run: |
          buildozer -v android debug
          echo "=== Checking bin folder ==="
          ls -la bin/ || echo "bin/ folder not found!"

      - name: Verify APK exists
        run: |
          if ls bin/*.apk 1>/dev/null 2>&1; then
            echo "✅ APK found!"
            ls -lh bin/*.apk
          else
            echo "❌ APK not found - build failed silently"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentStarterPack
          path: bin/*.apk
