name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    container:
      image: kivy/buildozer:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create missing __init__.py files
        run: |
          mkdir -p screens widgets utils
          touch screens/__init__.py widgets/__init__.py utils/__init__.py

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentStarterPack
          path: bin/*.apk
          retention-days: 7
