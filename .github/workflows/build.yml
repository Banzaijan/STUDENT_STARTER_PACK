name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            libffi-dev libssl-dev libltdl-dev zlib1g-dev \
            build-essential cmake

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Create missing __init__.py files
        run: |
          mkdir -p screens widgets utils
          touch screens/__init__.py widgets/__init__.py utils/__init__.py

      - name: Set up Android SDK for Buildozer
        run: |
          # Link pre-installed SDK and NDK into buildozer's expected location
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_HOME ~/.buildozer/android/platform/android-sdk
          ln -sf $ANDROID_NDK_HOME ~/.buildozer/android/platform/android-ndk-r25b

          # Accept licenses
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_HOME/licenses/intel-android-extra-license

          # Create the legacy tools/bin/sdkmanager symlink Buildozer expects
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager

          # Verify
          echo "sdkmanager location:"
          ls -la $ANDROID_HOME/tools/bin/sdkmanager

      - name: Build APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_NDK_HOME
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          buildozer -v android debug

      - name: List APK output
        run: ls -lh bin/ || echo "No bin folder — build may have failed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentStarterPack
          path: bin/*.apk
          retention-days: 7
