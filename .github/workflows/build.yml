name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config libffi-dev libssl-dev libltdl-dev
          pip install buildozer cython

      - name: Create init files
        run: |
          touch screens/__init__.py
          touch widgets/__init__.py
          touch utils/__init__.py

      - name: Create buildozer.spec
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = Student Starter Pack
          package.name = studentstarterpack
          package.domain = com.asiatech.student
          source.dir = .
          source.include_exts = py,png,jpg,kv,json
          version = 1.0
          requirements = python3,kivy==2.3.0
          orientation = portrait
          fullscreen = 0
          android.permissions = INTERNET
          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.archs = arm64-v8a
          [buildozer]
          log_level = 2
          EOF

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: StudentStarterPack
          path: bin/*.apk
```

