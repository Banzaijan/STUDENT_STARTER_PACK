name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Show project structure
        run: find . -name "*.py" | head -30

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config libffi-dev libssl-dev \
            libltdl-dev zlib1g-dev
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Create init files
        run: |
          touch screens/__init__.py widgets/__init__.py utils/__init__.py

      - name: Write buildozer.spec directly
        run: |
          cat > buildozer.spec << 'SPEC'
[app]
title = Student Starter Pack
package.name = studentstarterpack
package.domain = com.asiatech.student
source.dir = .
source.include_exts = py,png,jpg,kv,json
source.exclude_dirs = tests, bin, .buildozer
version = 1.0
requirements = python3,kivy==2.3.0
orientation = portrait
fullscreen = 0
android.permissions = INTERNET
android.api = 33
android.minapi = 21
android.ndk = 25b
android.archs = arm64-v8a

[buildozer]
log_level = 2
warn_on_root = 1
SPEC
          echo "=== spec written ==="
          cat buildozer.spec

      - name: Build APK
        run: buildozer -v android debug

      - name: List bin folder
        run: ls -lh bin/ || echo "No bin folder found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudentStarterPack
          path: bin/*.apk
